<!DOCTYPE html>

    <title>SmartRecruit Pro - AI Recruitment System</title>
    
    <!-- 1. ADD THIS LINE (Tailwind CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      // Shim process.env for local browser environments
      window.process = window.process || { env: { API_KEY: "", GEMINI_API_KEY: "" } };

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        body { font-family: 'Inter', sans-serif; }
        /* This helps prevent a white flash on reload if dark mode is active */
        .dark { background-color: #0f172a; color: white; }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-200">
